    model: ''
    provider: auto
    timeout: 30
  compression:
    model: ''
    provider: auto
    timeout: 120
  flush_memories:
    model: ''
    provider: auto
    timeout: 30
  mcp:
    model: ''
    provider: auto
    timeout: 30
  session_search:
    model: ''
    provider: auto
    timeout: 30
  skills_hub:
    model: ''
    provider: auto
    timeout: 30
  vision:
    download_timeout: 30
    model: ''
    provider: auto
    timeout: 120
  web_extract:
    model: ''
    provider: auto
    timeout: 360
